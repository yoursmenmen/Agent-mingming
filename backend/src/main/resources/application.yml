server:
  port: 18080

spring:
  profiles:
    active: local
  application:
    name: agent-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/agentdb}
    username: ${DB_USER:agent}
    password: ${DB_PASSWORD:agent}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true

  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info

agent:
  security:
    apiToken: ${AGENT_API_TOKEN:dev-token-change-me}
  mcp:
    default-server: ${AGENT_MCP_DEFAULT_SERVER:local-ops}
    runtime:
      enabled: ${AGENT_MCP_RUNTIME_ENABLED:true}
      allow-tools: ${AGENT_MCP_RUNTIME_ALLOW_TOOLS:}
      deny-tools: ${AGENT_MCP_RUNTIME_DENY_TOOLS:}
      max-callbacks: ${AGENT_MCP_RUNTIME_MAX_CALLBACKS:32}
    confirmation:
      enabled: ${AGENT_MCP_CONFIRMATION_ENABLED:true}
      pending-ttl-seconds: ${AGENT_MCP_CONFIRMATION_PENDING_TTL_SECONDS:300}
  rag:
    vector:
      enabled: ${AGENT_RAG_VECTOR_ENABLED:true}
      docsRoot: ${AGENT_RAG_VECTOR_DOCS_ROOT:../docs}
      embeddingModel: ${AGENT_RAG_VECTOR_EMBEDDING_MODEL:text-embedding-v3}
      embeddingVersion: ${AGENT_RAG_VECTOR_EMBEDDING_VERSION:2026-03}
    sources:
      localDocs:
        enabled: true
      url:
        enabled: true
        maxInMemorySizeBytes: ${AGENT_RAG_SOURCE_URL_MAX_IN_MEMORY_SIZE_BYTES:4194304}
        items:
          - name: spring-ai-docs
            url: https://docs.spring.io/spring-ai/reference/index.html
            enabled: true
          - name: mdn-http-conditional
            url: https://developer.mozilla.org/en-US/docs/Web/HTTP/Guides/Conditional_requests
            enabled: true
          - name: python-asyncio
            url: https://docs.python.org/3/library/asyncio.html
            enabled: true
          - name: kubernetes-overview
            url: https://kubernetes.io/docs/concepts/overview/
            enabled: true
    sync:
      scheduler:
        enabled: true
        cron: "0 0 3 ? * SUN"
        zone: "Asia/Shanghai"
