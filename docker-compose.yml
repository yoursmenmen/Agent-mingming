services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.pgvector
    container_name: agent-postgres
    environment:
      POSTGRES_DB: agentdb
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
    ports:
      - "5432:5432"
    volumes:
      - agent_pg_data:/var/lib/postgresql/data
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
volumes:
  agent_pg_data:
